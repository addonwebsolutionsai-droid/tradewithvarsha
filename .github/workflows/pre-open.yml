name: Pre-Open Prep (Mon-Fri 08:30 IST)

# 08:30 IST = 03:00 UTC. Refreshes the "morning" tabs 45 min before
# market open at 09:15 IST.

on:
  schedule:
    - cron: '0 3 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: pre-open
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preopen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        working-directory: server
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run pre-open tick
        working-directory: server
        env:
          NODE_ENV: production
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_ALLOWED_CHAT_IDS }}
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_SECRET_KEY: ${{ secrets.ANGEL_SECRET_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_MPIN: ${{ secrets.ANGEL_MPIN }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          FMP_KEY: ${{ secrets.FMP_KEY }}
          ALERT_MIN_GRADE: 'A'
          ALERT_MIN_SCORE: '9'
          ALERT_ON_NEW_SIGNAL: 'true'
        run: npm run tick:preopen

      - name: Commit refreshed snapshots
        if: success()
        run: |
          git config user.name  'tradewithvarsha-bot'
          git config user.email 'bot@tradewithvarsha.local'
          if git diff --quiet server/data/public-snapshots/ ; then
            echo "No snapshot changes."
          else
            git add server/data/public-snapshots/
            git commit -m "snapshot: pre-open $(TZ=Asia/Kolkata date '+%d/%-m/%Y, %H:%M:%S')"
            git push || (git pull --rebase && git push) || echo "Push failed — next run will retry."
          fi
